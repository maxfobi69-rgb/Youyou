name: YouTube Downloader (Manual)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیوی یوتیوب'
        required: true
        default: ''

jobs:
  download:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg zip # ابزارهای ضروری
          python3 -m pip install --upgrade pip
          pip install --upgrade yt-dlp
          # نصب ابزار تولید توکن و یک کتابخانه کمکی
          pip install bgutil-ytdlp-pot-provider
          pip install mpeg

      # این مرحله جدید است: تولید PO Token
      - name: Generate PO Token
        run: |
          mkdir -p downloads tmp_downloads
          # اجرای دستور تولید توکن و ذخیره آن در یک فایل موقت
          python3 -c "from bgutil_ytdlp_pot_provider import generate_po_token; print(generate_po_token())" > /tmp/po_token.txt
          echo "✅ PO Token generated."

      - name: Download YouTube video
        run: |
          URL="${{ github.event.inputs.video_url }}"
          echo "⬇️ Downloading: $URL"

          # مرحله اصلی دانلود با استفاده از توکن تولید شده
          yt-dlp \
            --verbose \
            --force-ipv4 \
            --extractor-args "youtube:player_client=android,ios;po_token=$(cat /tmp/po_token.txt)" \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            -o "tmp_downloads/%(title)s.%(ext)s" \
            "$URL"

      - name: Split large files (like github-sandbox)
        run: |
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))
            BASENAME=$(basename "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting with zip..."
              zip -0 -s 90m "downloads/${BASENAME}.zip" -j "$FILE"
            else
              cp "$FILE" "downloads/$BASENAME"
            fi
          done

          rm -rf tmp_downloads

      - name: Commit & Push files
        run: |
          # ... (این بخش از کد شما بدون تغییر باقی می‌ماند) ...
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          # ... و غیره
