name: YouTube Downloader (Final)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیوی یوتیوب'
        required: true

jobs:
  download:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg zip
          pip install --upgrade yt-dlp

      - name: Convert Bb.txt to valid cookies.txt
        run: |
          echo "===== محتوای اولیه Bb.txt ====="
          cat -A Bb.txt
          echo ""
          echo "===== تبدیل فاصله‌ها به تب ====="
          # دستور awk خطوط را می‌خواند، ۷ بخش اول را با تب جدا می‌کند و باقی‌مانده را به‌عنوان مقدار (value) در نظر می‌گیرد
          awk '{
            domain=$1; flag=$2; path=$3; secure=$4; expiry=$5; name=$6;
            value=""; for(i=7; i<=NF; i++) value=(value==""?"":value" ")$i;
            print domain"\t"flag"\t"path"\t"secure"\t"expiry"\t"name"\t"value
          }' Bb.txt > cookies.txt
          echo ""
          echo "===== فایل cookies.txt نهایی ====="
          cat -A cookies.txt
          echo "تعداد خطوط: $(wc -l < cookies.txt)"
          # بررسی وجود تب
          if grep -qP '\t' cookies.txt; then
            echo "✅ فایل cookies.txt اکنون معتبر است."
          else
            echo "❌ هنوز مشکلی وجود دارد. لطفاً خروجی بالا را بررسی کنید."
            exit 1
          fi

      - name: Download video
        run: |
          mkdir -p downloads tmp_downloads
          yt-dlp --cookies cookies.txt \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            -o "tmp_downloads/%(title)s.%(ext)s" \
            "${{ github.event.inputs.video_url }}"

      - name: Split large files
        run: |
          for f in tmp_downloads/*; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f")
            if [ $size -gt $((90*1024*1024)) ]; then
              echo "Splitting $(basename "$f")..."
              zip -0 -s 90m "downloads/$(basename "$f").zip" -j "$f"
            else
              cp "$f" downloads/
            fi
          done
          rm -rf tmp_downloads

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          git commit -m "Add YouTube video" || echo "No changes"
          git push
