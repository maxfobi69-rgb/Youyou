name: YouTube Downloader (Final)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیوی یوتیوب'
        required: true

jobs:
  download:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools and EJS package
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg zip nodejs npm
          # نصب بسته رسمی yt-dlp-ejs با pip
          pip install --upgrade yt-dlp yt-dlp-ejs
          echo "✅ yt-dlp and EJS package installed successfully"

      - name: Download video
        run: |
          mkdir -p downloads tmp_downloads
          yt-dlp \
            --cookies cookies.txt \
            --js-runtimes node \
            --force-ipv4 \
            --extractor-args "youtube:player_client=web" \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            -o "tmp_downloads/%(title)s.%(ext)s" \
            "${{ github.event.inputs.video_url }}"

      # ... سایر بخش‌ها (Split, Commit) بدون تغییر ...
