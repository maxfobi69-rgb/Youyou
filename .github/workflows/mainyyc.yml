name: YouTube Downloader (Manual)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیوی یوتیوب (https://www.youtube.com/watch?v=...)'
        required: true
        default: ''

jobs:
  download:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg zip
          python3 -m pip install --upgrade pip
          pip install --upgrade yt-dlp

      - name: Extract video ID
        run: |
          URL="${{ github.event.inputs.video_url }}"
          VIDEO_ID=$(echo "$URL" | sed -n 's/.*\(v=\|youtu\.be\/\|embed\/\)\([A-Za-z0-9_-]\{11\}\).*/\2/p')
          if [ -z "$VIDEO_ID" ]; then
            echo "❌ Could not extract video ID from URL: $URL"
            exit 1
          fi
          echo "Video ID: $VIDEO_ID"
          echo "VIDEO_ID=$VIDEO_ID" >> $GITHUB_ENV

      - name: Download video from Invidious (with fallback)
        run: |
          mkdir -p downloads tmp_downloads
          
          # چندین نمونه Invidious به ترتیب اولویت
          INSTANCES=(
            "https://vid.puffyan.us"
            "https://invidious.slipfox.xyz"
            "https://inv.zzls.xyz"
            "https://yewtu.be"
            "https://invidious.fdn.fr"
            "https://invidio.xamh.de"
          )
          
          SUCCESS=0
          for INSTANCE in "${INSTANCES[@]}"; do
            INV_URL="${INSTANCE}/watch?v=${{ env.VIDEO_ID }}"
            echo "🔄 Trying Invidious instance: $INSTANCE"
            
            if curl -s --max-time 5 --head "$INV_URL" | head -n 1 | grep -qE "200|301|302"; then
              echo "✅ Instance $INSTANCE is reachable"
            else
              echo "⚠️  $INSTANCE is not reachable, trying next..."
              continue
            fi
            
            # تلاش برای دانلود
            if yt-dlp \
              --verbose \
              --force-ipv4 \
              -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
              -o "tmp_downloads/%(title)s.%(ext)s" \
              "$INV_URL"; then
              echo "🎉 Download succeeded via $INSTANCE"
              SUCCESS=1
              break
            else
              echo "❌ Download failed via $INSTANCE, trying next..."
            fi
          done
          
          if [ "$SUCCESS" -ne 1 ]; then
            echo "❌ All Invidious instances failed"
            exit 1
          fi

      - name: Split large files (like github-sandbox)
        run: |
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))
            BASENAME=$(basename "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting with zip..."
              zip -0 -s 90m "downloads/${BASENAME}.zip" -j "$FILE"
            else
              cp "$FILE" "downloads/$BASENAME"
            fi
          done

          rm -rf tmp_downloads

      - name: Commit & Push files
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mapfile -t ALL_FILES < <(git ls-files --others --modified --exclude-standard downloads/)

          TOTAL=${#ALL_FILES[@]}
          echo "📦 Total files to push: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "Nothing to commit"
            exit 0
          fi

          BATCH_SIZE=5
          BATCH_NUM=0

          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")

            echo "🚀 Pushing batch $BATCH_NUM: files $((i+1))–$(( i + ${#BATCH[@]} )) of $TOTAL"

            git add "${BATCH[@]}"
            git commit -m "Add YouTube video — batch $BATCH_NUM [skip ci]"

            git pull --rebase origin "$BRANCH"
            git push origin HEAD:"$BRANCH"

            echo "✅ Batch $BATCH_NUM pushed"
          done

          echo "🎉 All $TOTAL files pushed in $BATCH_NUM batch(es)"
