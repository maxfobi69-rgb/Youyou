name: YouTube Downloader (Manual)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیوی یوتیوب را وارد کنید'
        required: true

jobs:
  download:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # توقف ایمن در صورت خالی بودن لینک
      - name: Check video URL
        if: github.event.inputs.video_url == ''
        run: |
          echo "⚠️ لینک ویدیو وارد نشده است!"
          echo "لطفاً به تب Actions بروید، workflow را انتخاب کنید، لینک را وارد کرده و سپس Run workflow را بزنید."
          exit 1

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg zip
          pip install --upgrade yt-dlp

      # اعتبارسنجی و تبدیل فایل کوکی Bb.txt
      - name: Validate and fix cookies file
        run: |
          echo "===== محتوای Bb.txt (با cat -A) ====="
          cat -A Bb.txt | head -n 5
          echo "تعداد خطوط: $(wc -l < Bb.txt)"
          
          if grep -qP '\t' Bb.txt; then
            echo "✅ فایل Bb.txt دارای تب است."
          else
            echo "⚠️ فاقد تب – در حال تبدیل خودکار..."
            python3 -c "
import re
with open('Bb.txt', 'r') as f:
    lines = f.readlines()
with open('Bb.txt', 'w') as f:
    for line in lines:
        line = line.strip()
        if not line:
            continue
        parts = line.split()
        if len(parts) >= 7:
            new_line = '\t'.join(parts[:6]) + '\t' + ' '.join(parts[6:])
            f.write(new_line + '\n')
        else:
            f.write(line + '\n')
            "
            echo "✅ تبدیل انجام شد."
            cat -A Bb.txt | head -n 5
          fi

      - name: Download video
        run: |
          mkdir -p downloads tmp_downloads
          yt-dlp --cookies Bb.txt \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            -o "tmp_downloads/%(title)s.%(ext)s" \
            "${{ github.event.inputs.video_url }}"

      - name: Split large files
        run: |
          for f in tmp_downloads/*; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f")
            if [ $size -gt $((90*1024*1024)) ]; then
              echo "Splitting $(basename "$f")..."
              zip -0 -s 90m "downloads/$(basename "$f").zip" -j "$f"
            else
              cp "$f" downloads/
            fi
          done
          rm -rf tmp_downloads

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          git commit -m "Add YouTube video" || echo "No changes"
          git push
