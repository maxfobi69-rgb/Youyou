name: YouTube Downloader (Final)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیوی یوتیوب'
        required: true
      cookie_b64:
        description: 'کوکی Base64 (از کنسول Kiwi کپی کنید)'
        required: true

jobs:
  download:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg zip
          pip install --upgrade yt-dlp

      - name: Decode cookies and create cookies.txt
        shell: python
        run: |
          import base64, sys
          b64 = '''${{ github.event.inputs.cookie_b64 }}'''.strip()
          if not b64:
              print('❌ رشته Base64 خالی است!')
              sys.exit(1)
          try:
              cookie_text = base64.b64decode(b64).decode('utf-8')
          except Exception as e:
              print(f'❌ خطا در رمزگشایی Base64: {e}')
              sys.exit(1)
          # چاپ برای بررسی
          lines = cookie_text.split('\n')
          print(f'✅ تعداد خطوط: {len(lines)}')
          for i, line in enumerate(lines[:3]):
              print(f'  خط {i+1}: {repr(line)}')
          # اطمینان از وجود تب
          if '\t' not in cookie_text:
              print('❌ کوکی‌ها حاوی تب نیستند! لطفاً دوباره از Kiwi استخراج کنید.')
              sys.exit(1)
          with open('cookies.txt', 'w', encoding='utf-8') as f:
              f.write(cookie_text)
          print('✅ فایل cookies.txt با موفقیت ایجاد شد.')

      - name: Download video
        run: |
          mkdir -p downloads tmp_downloads
          yt-dlp --cookies cookies.txt \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            -o "tmp_downloads/%(title)s.%(ext)s" \
            "${{ github.event.inputs.video_url }}"

      - name: Split large files
        run: |
          for f in tmp_downloads/*; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f")
            if [ $size -gt $((90*1024*1024)) ]; then
              echo "Splitting $(basename "$f")..."
              zip -0 -s 90m "downloads/$(basename "$f").zip" -j "$f"
            else
              cp "$f" downloads/
            fi
          done
          rm -rf tmp_downloads

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          git commit -m "Add YouTube video" || echo "No changes"
          git push
