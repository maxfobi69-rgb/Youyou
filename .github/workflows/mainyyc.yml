name: YouTube Downloader (Manual)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیوی یوتیوب'
        required: true
        default: ''

jobs:
  download:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ساخت محیط مجازی و نصب تمام بسته‌ها در آن
      - name: Setup Python venv and install packages
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg zip xvfb
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install --upgrade yt-dlp
          pip install --upgrade bgutil-ytdlp-pot-provider

      - name: Generate PO Token
        run: |
          source venv/bin/activate
          mkdir -p downloads tmp_downloads
          # با استفاده از پایتون درون venv، ماژول را import می‌کنیم و توکن را می‌گیریم
          python -c "from bgutil_ytdlp_pot_provider import generate_po_token; print(generate_po_token())" > /tmp/po_token.txt
          echo "✅ PO Token generated."

      - name: Download YouTube video
        run: |
          source venv/bin/activate
          URL="${{ github.event.inputs.video_url }}"
          echo "⬇️ Downloading: $URL"

          yt-dlp \
            --verbose \
            --force-ipv4 \
            --extractor-args "youtube:player_client=android,ios;po_token=$(cat /tmp/po_token.txt)" \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            -o "tmp_downloads/%(title)s.%(ext)s" \
            "$URL"

      - name: Split large files (like github-sandbox)
        run: |
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))
            BASENAME=$(basename "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting with zip..."
              zip -0 -s 90m "downloads/${BASENAME}.zip" -j "$FILE"
            else
              cp "$FILE" "downloads/$BASENAME"
            fi
          done

          rm -rf tmp_downloads

      - name: Commit & Push files
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mapfile -t ALL_FILES < <(git ls-files --others --modified --exclude-standard downloads/)

          TOTAL=${#ALL_FILES[@]}
          echo "📦 Total files to push: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "Nothing to commit"
            exit 0
          fi

          BATCH_SIZE=5
          BATCH_NUM=0

          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")

            echo "🚀 Pushing batch $BATCH_NUM: files $((i+1))–$(( i + ${#BATCH[@]} )) of $TOTAL"

            git add "${BATCH[@]}"
            git commit -m "Add YouTube video — batch $BATCH_NUM [skip ci]"

            git pull --rebase origin "$BRANCH"
            git push origin HEAD:"$BRANCH"

            echo "✅ Batch $BATCH_NUM pushed"
          done

          echo "🎉 All $TOTAL files pushed in $BATCH_NUM batch(es)"
