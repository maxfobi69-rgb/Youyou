name: YouTube Downloader (Final)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیوی یوتیوب'
        required: true

jobs:
  download:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools (including Node.js)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg zip nodejs npm
          pip install --upgrade yt-dlp

      - name: Validate and fix cookies file
        run: |
          echo "===== افزودن هدر استاندارد Netscape ====="
          if ! head -n 1 cookies.txt | grep -q "# Netscape HTTP Cookie File"; then
            sed -i '1i # Netscape HTTP Cookie File' cookies.txt
          fi
          echo ""
          echo "===== بررسی تب‌ها ====="
          cat -A cookies.txt | head -n 5
          if grep -qP '\t' cookies.txt; then
            echo "✅ فایل cookies.txt دارای تب است."
          else
            echo "⚠️ فاقد تب – تبدیل خودکار..."
            awk '{
              domain=$1; flag=$2; path=$3; secure=$4; expiry=$5; name=$6;
              value=""; for(i=7; i<=NF; i++) value=(value==""?"":value" ")$i;
              print domain"\t"flag"\t"path"\t"secure"\t"expiry"\t"name"\t"value
            }' cookies.txt > temp.txt && mv temp.txt cookies.txt
            echo "✅ تبدیل انجام شد."
            cat -A cookies.txt | head -n 5
          fi

      # مرحله‌ی دانلود با Node.js و شبیه‌سازی Android
      - name: Download video (with JS runtime)
        run: |
          mkdir -p downloads tmp_downloads
          yt-dlp \
            --cookies cookies.txt \
            --js-runtimes node \
            --extractor-args "youtube:player_client=android" \
            --force-ipv4 \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            -o "tmp_downloads/%(title)s.%(ext)s" \
            "${{ github.event.inputs.video_url }}"

      - name: Split large files
        run: |
          for f in tmp_downloads/*; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f")
            if [ $size -gt $((90*1024*1024)) ]; then
              echo "Splitting $(basename "$f")..."
              zip -0 -s 90m "downloads/$(basename "$f").zip" -j "$f"
            else
              cp "$f" downloads/
            fi
          done
          rm -rf tmp_downloads

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          git commit -m "Add YouTube video" || echo "No changes"
          git push
