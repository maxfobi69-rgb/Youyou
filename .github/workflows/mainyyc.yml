name: YouTube Downloader (Final)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیوی یوتیوب'
        required: true

jobs:
  download:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg zip
          pip install --upgrade yt-dlp

      - name: Download via Invidious (with fallback)
        run: |
          mkdir -p downloads tmp_downloads
          URL="${{ github.event.inputs.video_url }}"
          # استخراج ID ویدیو
          VIDEO_ID=$(echo "$URL" | sed -n 's/.*\(v=\|youtu\.be\/\|embed\/\)\([A-Za-z0-9_-]\{11\}\).*/\2/p')
          if [ -z "$VIDEO_ID" ]; then
            echo "❌ Could not extract video ID"
            exit 1
          fi
          echo "Video ID: $VIDEO_ID"
          
          # لیست نمونه‌های Invidious
          INSTANCES=(
            "https://yewtu.be"
            "https://invidious.fdn.fr"
            "https://inv.nadeko.net"
            "https://vid.puffyan.us"
            "https://invidious.slipfox.xyz"
            "https://inv.zzls.xyz"
            "https://invidio.xamh.de"
          )
          
          SUCCESS=0
          for INSTANCE in "${INSTANCES[@]}"; do
            INV_URL="${INSTANCE}/watch?v=${VIDEO_ID}"
            echo "🔄 Trying Invidious: $INSTANCE"
            
            # بررسی دسترسی‌پذیری
            if curl -s --max-time 10 --head "$INV_URL" | head -n 1 | grep -qE "200|301|302"; then
              echo "✅ Reachable"
            else
              echo "⚠️  Not reachable, trying next..."
              continue
            fi
            
            # دانلود با yt-dlp
            if yt-dlp --no-check-certificate --force-ipv4 \
              -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
              -o "tmp_downloads/%(title)s.%(ext)s" \
              "$INV_URL"; then
              echo "🎉 Success via $INSTANCE"
              SUCCESS=1
              break
            else
              echo "❌ Failed via $INSTANCE"
            fi
          done
          
          if [ "$SUCCESS" -ne 1 ]; then
            echo "❌ All Invidious instances failed"
            exit 1
          fi

      - name: Split large files
        run: |
          for f in tmp_downloads/*; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f")
            if [ $size -gt $((90*1024*1024)) ]; then
              echo "Splitting $(basename "$f")..."
              zip -0 -s 90m "downloads/$(basename "$f").zip" -j "$f"
            else
              cp "$f" downloads/
            fi
          done
          rm -rf tmp_downloads

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          git commit -m "Add YouTube video" || echo "No changes"
          git push
