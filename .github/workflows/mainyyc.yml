name: YouTube Downloader (Final)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیوی یوتیوب'
        required: true
      po_token:
        description: 'PO Token (خط اول خروجی Kiwi را کپی کنید)'
        required: false
        default: ''

jobs:
  download:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools (Node.js + yt-dlp)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg zip nodejs npm
          pip install --upgrade yt-dlp

      - name: Validate cookies file
        run: |
          if ! head -n 1 cookies.txt | grep -q "# Netscape HTTP Cookie File"; then
            sed -i '1i # Netscape HTTP Cookie File' cookies.txt
          fi
          echo "===== cookies.txt (first 5 lines) ====="
          cat -A cookies.txt | head -n 5

      - name: Prepare PO Token (if provided)
        run: |
          PO_TOKEN="${{ github.event.inputs.po_token }}"
          if [ -n "$PO_TOKEN" ]; then
            echo "✅ PO Token provided (length: ${#PO_TOKEN})"
            echo "PO_TOKEN=$PO_TOKEN" >> $GITHUB_ENV
          else
            echo "⚠️ No PO Token provided – relying on cookies and JS runtime only"
          fi

      - name: Download video
        run: |
          mkdir -p downloads tmp_downloads
          EXTRA_ARGS=""
          if [ -n "$PO_TOKEN" ]; then
            EXTRA_ARGS="--extractor-args youtube:player_client=android;po_token=$PO_TOKEN"
          else
            EXTRA_ARGS="--extractor-args youtube:player_client=android"
          fi
          yt-dlp \
            --cookies cookies.txt \
            --js-runtimes node \
            --force-ipv4 \
            $EXTRA_ARGS \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            -o "tmp_downloads/%(title)s.%(ext)s" \
            "${{ github.event.inputs.video_url }}"

      - name: Split large files
        run: |
          for f in tmp_downloads/*; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f")
            if [ $size -gt $((90*1024*1024)) ]; then
              echo "Splitting $(basename "$f")..."
              zip -0 -s 90m "downloads/$(basename "$f").zip" -j "$f"
            else
              cp "$f" downloads/
            fi
          done
          rm -rf tmp_downloads

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          git commit -m "Add YouTube video" || echo "No changes"
          git push
