name: YouTube Downloader (Manual)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیوی یوتیوب'
        required: true

jobs:
  download:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg zip
          pip install --upgrade yt-dlp

      - name: Create cookies file from base64 secret
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" | base64 -d > cookies.txt
          # [اختیاری] بررسی اینکه فایل درست ساخته شده
          echo "Number of lines in cookies.txt: $(wc -l < cookies.txt)"
          head -n 1 cookies.txt

      - name: Download video
        run: |
          mkdir -p downloads tmp_downloads
          yt-dlp --cookies cookies.txt -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            -o "tmp_downloads/%(title)s.%(ext)s" "${{ github.event.inputs.video_url }}"

      - name: Split large files
        run: |
          for f in tmp_downloads/*; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f")
            if [ $size -gt $((90*1024*1024)) ]; then
              echo "Splitting $(basename "$f")..."
              zip -0 -s 90m "downloads/$(basename "$f").zip" -j "$f"
            else
              cp "$f" downloads/
            fi
          done
          rm -rf tmp_downloads

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          git commit -m "Add YouTube video" || echo "No changes"
          git push
