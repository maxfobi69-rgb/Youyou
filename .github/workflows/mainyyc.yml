name: YouTube Video Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'https://www.youtube.com/watch?v=uqz3lej6iLU'
        required: true
        default: ''

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          pip install --upgrade yt-dlp

      - name: Download video
        run: |
          mkdir -p downloads
          # --verbose کمک می‌کند خطاها کامل‌تر دیده شوند
          yt-dlp --verbose -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" -o "downloads/%(title)s.%(ext)s" "${{ github.event.inputs.video_url }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video
          path: downloads/*.mp4
