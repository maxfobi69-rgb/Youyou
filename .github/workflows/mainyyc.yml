name: YouTube Downloader (Manual)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیوی یوتیوب'
        required: true

env:
  # 👇 رشتهٔ Base64 خود را دقیقاً در اینجا قرار دهید (بدون گیومه و فاصلهٔ اضافه)
  COOKIE_B64: LnlvdXR1YmUuY29tCVRSVUUJLwlGQUxTRQkwCVBSRUYJdHo9QXNpYS5UZWhyYW4KLnlvdXR1YmUuY29tCVRSVUUJLwlGQUxTRQkwCVNPQ1MJQ0FJU0V3Z0RFZ2s1TURZMU1qWTBOellhQW1WdUlBRWFCZ2lBOGJfUEJnCi55b3V0dWJlLmNvbQlUUlVFCS8JRkFMU0UJMAlfX1NlY3VyZS0zUEFQSVNJRAlTUF80ZWhtZHp3QjFDX19pL0FWYWNxSzg5b2Y4RmhzMkR4

jobs:
  download:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg zip
          pip install --upgrade yt-dlp

      - name: Decode Base64 and create cookies.txt
        shell: python
        run: |
          import base64, os
          b64 = os.environ['COOKIE_B64'].strip()
          # رمزگشایی Base64 به متن اصلی کوکی
          cookie_text = base64.b64decode(b64).decode('utf-8')
          with open('cookies.txt', 'w', encoding='utf-8') as f:
              f.write(cookie_text)
          # چاپ چند خط اول برای اطمینان
          lines = cookie_text.split('\n')
          print(f"✅ {len(lines)} lines in cookies.txt")
          for i, line in enumerate(lines[:3]):
              print(f"  line {i+1}: {line}")

      - name: Download video
        run: |
          mkdir -p downloads tmp_downloads
          yt-dlp --cookies cookies.txt \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            -o "tmp_downloads/%(title)s.%(ext)s" \
            "${{ github.event.inputs.video_url }}"

      - name: Split large files
        run: |
          for f in tmp_downloads/*; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f")
            if [ $size -gt $((90*1024*1024)) ]; then
              echo "Splitting $(basename "$f")..."
              zip -0 -s 90m "downloads/$(basename "$f").zip" -j "$f"
            else
              cp "$f" downloads/
            fi
          done
          rm -rf tmp_downloads

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/
          git commit -m "Add YouTube video" || echo "No changes"
          git push
